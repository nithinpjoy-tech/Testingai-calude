# ─────────────────────────────────────────────────────────────────────────────
# Test Triage Tool — Docker Compose
# Usage:
#   cp .env.example .env          # add ANTHROPIC_API_KEY
#   docker compose up             # start (builds automatically)
#   docker compose up --build     # force rebuild after code changes
#   docker compose down -v        # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:
  chromadb:
    image: chromadb/chroma:1.0.0
    container_name: -chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"          # exposed on host as 8001 to avoid conflicts
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
      ALLOW_RESET: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  triage-ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: -triage-tool:milestone1
    container_name: -triage
    restart: unless-stopped

    ports:
      - "8501:8501"          # Streamlit UI → http://localhost:8501

    volumes:
      # Persist SQLite run history across container restarts
      - triage-db:/app/data
      # Mount sample files so they survive image rebuilds
      - ./samples:/app/samples:ro

    env_file:
      - .env                 # ANTHROPIC_API_KEY lives here

    depends_on:
      chromadb:
        condition: service_healthy

    environment:
      # Model override — change here without rebuilding
      CLAUDE_MODEL: "claude-sonnet-4-20250514"
      APP_ENV: "demo"
      # Streamlit
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      # Knowledge Base — points to the chromadb service
      CHROMADB_HOST: "chromadb"
      CHROMADB_PORT: "8000"
      KB_COLLECTION: "_knowledge"
      KB_EMBEDDING_MODEL: "all-MiniLM-L6-v2"

    healthcheck:
      test: >
        python -c
        "import urllib.request;
         urllib.request.urlopen('http://localhost:8501/_stcore/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Resource limits — sensible for a demo/dev deployment
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  triage-db:
    driver: local
    labels:
      com..triage.description: "SQLite run history + saved reports"
  chroma_data:
    driver: local
    labels:
      com..triage.description: "ChromaDB vector store for Knowledge Base"
